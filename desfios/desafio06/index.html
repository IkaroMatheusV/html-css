<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>funções</title>
</head>
<body>
    <h1>tags HTML</h1>
    <p>Em HTML5, podemos inserir elementos da lista a serguir. Passe o mouse em cima dos termos para saber qual tag usar em cada caso.</p>
    <ul type="squere">
        <li><abbr title="use a tag &lt;p&gt; ">Paragrafos</abbr></li>
        <li><abbr title="use as tags &lt;h1&gt;,&lt;h2&gt;,&lt;h3&gt;,&lt;h4&gt;,&lt;h5&gt; e &lt;h6&gt;">Titulos</abbr></li>
        <li><abbr title="use a tag &lt;img&gt; ">Imagens</abbr></li>
        <li><abbr title="use a tag &lt;abbr&gt;">Abreviações</abbr></li>
        <li><abbr title="use a tag &lt;code&gt;">Codigos-fonte</abbr></li>
        <li><abbr title="use as tags &lt;ol&gt; e &lt;li&gt;">Listas numeradas</abbr></li>
        <li><abbr title="use as tags &lt;ul&gt; e &lt;li&gt; ">Listas com demarcações</abbr></li>
    </ul>
</body>
</html>
