<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            border-collapse: collapse;
        }
        caption{
            font-size: 1.3em;
            font-weight: bold;
            padding: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
        .col1{
            background-color: gray;
        }

    </style>
</head>
<body>
    <table>
        <colgroup>
            <col class="col1">
            <col class="col2">
            <col class="col3">
            <col class="col4">
        </colgroup>
        <caption>Imformações Principas</caption>
        <tr>
            <th>Nome</th>
            <th>Sexo</th>
            <th>Idade</th>
            <th>Profissão</th>
        </tr>

        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>26</td>
            <td>jornalista</td>
        </tr>

        <tr>
            <td>João Gomes</td>
            <td>M</td>
            <td>29</td>
            <td>Cantor</td>
        </tr>

        <tr>
            <td>Damiana</td>
            <td>F</td>
            <td>47</td>
            <td>Faxineira</td>
        </tr>

        <tr>
            <td>Davi</td>
            <td>M</td>
            <td>22</td>
            <td>Programador</td>
        </tr>

        <tr>
            <td>Silvio</td>
            <td>M</td>
            <td>38</td>
            <td>Professor</td>
        </tr>

        <tr>
            <td>Mari</td>
            <td>F</td>
            <td>52</td>
            <td>Medica</td>
        </tr>
    </table>
</body>
</html>
