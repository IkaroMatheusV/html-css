<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
</head>
<body>
    <h1>uso de tabelas grandes</h1>
    <!--
        ANATOMIAS PRA TABELAS GRANDES
        TABLE
            THEAD
                TR, TD, TH

            TBODY
                TR, TD, TH

            TFOOT
                TR, TD, TH
    -->
    <table>
        <thead>
            <tr>
                <th>Estado</th>
                <th>População</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>São Paulo</td>
                <td>45 919 049</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
