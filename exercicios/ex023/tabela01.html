<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
        }
        h1 {
            color: red;
        }
        table {
            border-collapse: collapse;
            border: 2px solid rgba(0, 255, 0, 0.644);
        }
        td {
            border: 1px solid rgba(0, 255, 0, 0.644);
            padding: 8px;
            width: 100px;
            color: red;
        }
        td.data {
            background-color: blue;
        }
    </style>
</head>
<body>
    <h1>criando minha primeira tabela</h1>
    <table>
        <tr>
            <td class="data">A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr>
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr>
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr>
            <td>A4</td>
            <td>B4</td>
            <td class="data">C4</td>
        </tr>
    </table>
</body>
</html>
