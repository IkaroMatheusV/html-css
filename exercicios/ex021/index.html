<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box to box</title>
    <style>
        .box1 {
            
            font-family: 'Courier New', Courier, monospace;
            background-color: lightslategray;

            padding: 50px;

        }

            padding: 5px;

        }
    </style>

<body>
            <div class="box1">
                <h1>Exemplo de box-level</h1>
                <p>Paragrafos tambem são exemplos de box-level, mas os <a href="https://www.instagram.com/_ikaro_matheus/" target="_blank" rel="external">links são exemplos de caixa inline-level</a> vamos ver como tudo isso funciona</p>
