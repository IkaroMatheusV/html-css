<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudo-classes</title>
    <style>
        div{
            text-align: center;
            display: inline-block;
            background-color: lightgrey;
            border: 2px solid black;
            border-radius: 10px;
            height: 300px;
            width: 300px;
        }
        div#d1:hover{
            background-color: red;
            color: white;
        }
        div#d2:hover{
            background-color: green;
            color: white;
        }
        div#d3:hover{
            background-color: blue;
            color: white;
        }
    </style>
</head>
<body>
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03</div>
</body>
</html>
