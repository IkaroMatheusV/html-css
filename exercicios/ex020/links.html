<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body{
            font-family: 'Courier New', Courier, monospace;
        }
        a  {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited {
            color: darkred;
        }
        a:hover{
            text-decoration: underline;
            color: black;

        }
        a:active{
            color: rgb(255, 94, 0);
        }
        a::after{
            content: '[link]';
            text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }
    </style>
</head>
<body>
    <h1>personalizando links</h1>
    <ul >
        <li><img src="imagens/icone-instagram.png" alt="instagram"><a href="https://www.instagram.com/_ikaro_matheus/" target="_blank" rel="external">intagram</a></li>
        <li><img src="imagens/icone-facebook.png" alt="facebook"><a href="https://www.facebook.com/ikaro.matheus.33/?locale=pt_BR" target="_blank" rel="external">facebook</a></li>
        
    </ul>
</body>
</html>
